<html>
  <head>
    <title>
      RA usando AR.js e A-Frame. Marcador Miro e modelo 3d com A-Frame.
    </title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene vr-node-ui="enabled: false" embedded arjs ="debugUIEnabled: false">
      <a-marker preset="hero">
        <a-cylinder position="0 0.5 0"color="cyan" material="side: double" open-ended="true" rotation="90 0 0"></a-cylinder>
      </a-marker>
      <a-entity camera>
        
      </a-entity>
    </a-scene>
  </body>
</html>
